{% extends 'base.html' %}

{% block title %}Sign Up - PetParadise{% endblock %}

{% block content %}
<section style="background: linear-gradient(135deg, rgba(122, 178, 177, 0.1) 0%, rgba(234, 219, 200, 0.1) 100%); min-height: 90vh; display: flex; align-items: center;">
    <div class="container">
        <div class="form-container glass">
            <h1 class="text-center">Join PetZone 🏡</h1>
            <p class="text-center" style="margin-bottom: 40px; color: #555;">Create an account to join our community and find your furry soulmate.</p>
            
            <form action="{{ url_for('signup') }}" method="POST">
                <label>Full Name</label>
                <input type="text" name="name" required>
                
                <label>Email Address</label>
                <input type="email" name="email" required>
                
                <label>Mobile Number</label>
                <input type="text" name="phone" required>
                
                <label>Password</label>
                <input type="password" name="password" required>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Sign Up</button>
            </form>
            
            <div class="text-center" style="margin-top: 30px; font-size: 0.9rem;">
                <p>Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Login</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
