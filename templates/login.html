{% extends 'base.html' %}

{% block title %}Login - PetParadise{% endblock %}

{% block content %}
<section style="background: linear-gradient(135deg, rgba(122, 178, 177, 0.1) 0%, rgba(234, 219, 200, 0.1) 100%); min-height: 90vh; display: flex; align-items: center;">
    <div class="container">
        <div class="form-container glass">
            <h1 class="text-center">Welcome Back 🐾</h1>
            <p class="text-center" style="margin-bottom: 40px; color: #555;">Please login to your account to continue.</p>
            
            <form action="{{ url_for('login', next=request.args.get('next', '')) }}" method="POST">
                <label>Email Address</label>
                <input type="email" name="email" required>
                
                <label>Password</label>
                <input type="password" name="password" required>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Login</button>
            </form>
            
            <div class="text-center" style="margin-top: 30px; font-size: 0.9rem;">
                <p>Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--primary); font-weight: 600;">Sign Up</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
